name: Deploy Mauro Bot
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t prod

      - name: Plan changes
        id: plan
        run: |
          plan=$(databricks bundle plan -t prod 2>&1)
          echo "$plan"
          {
            echo 'PLAN_OUTPUT<<EOF'
            echo "$plan"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Diff bundle config
        id: diff
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          diff_output=$(git diff origin/main -- databricks.yml app.yaml || true)
          {
            echo 'DIFF_OUTPUT<<EOF'
            echo "$diff_output"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.PLAN_OUTPUT }}
          DIFF: ${{ steps.diff.outputs.DIFF_OUTPUT }}
        with:
          script: |
            const plan = process.env.PLAN;
            const diff = process.env.DIFF;
            let body = '### Databricks Bundle Plan\n\n';
            body += '```\n' + plan + '\n```\n\n';
            if (diff) {
              body += '<details>\n<summary>Cambios en config del bundle</summary>\n\n';
              body += '```diff\n' + diff + '\n```\n\n</details>\n\n';
            }
            body += '*Generated by CI — [docs](https://docs.databricks.com/dev-tools/bundles)*';
            // Borrar comentarios previos del bot
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const c of comments.data) {
              if (c.body.includes('Databricks Bundle Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Deploy to production
        run: databricks bundle deploy -t prod

      - name: Start/restart app
        run: databricks bundle run mauro_bot_app -t prod
