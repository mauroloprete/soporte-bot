bundle:
  name: mauro-bot

variables:
  catalog:
    default: dev_bronze
  schema:
    default: labs
  lakebase_project_id:
    default: maurobot-memory
  llm_endpoint:
    default: databricks-meta-llama-3-3-70b-instruct

resources:
  schemas:
    mauro_bot_schema:
      catalog_name: ${var.catalog}
      name: ${var.schema}

  experiments:
    agent_experiment:
      name: /Users/${workspace.current_user.userName}/mauro-bot

  # Mantener para no borrar las 12 versiones existentes
  registered_models:
    mauro_bot_model:
      name: mauro_bot
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}

  vector_search_endpoints:
    mauro_bot_vs:
      name: mauro-bot-vs
      endpoint_type: STANDARD

  jobs:
    load_knowledge_base:
      name: "[${bundle.target}] Load Knowledge Base"
      tasks:
        - task_key: load
          notebook_task:
            notebook_path: ./src/load_knowledge_base.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: refresh_index
          depends_on:
            - task_key: load
          notebook_task:
            notebook_path: ./src/refresh_index.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              vs_endpoint_name: ${resources.vector_search_endpoints.mauro_bot_vs.name}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "America/Montevideo"

  apps:
    mauro_bot_app:
      name: mauro-bot
      description: "RAG chatbot — Spark de Ideas blog"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_EXPERIMENT_NAME
            value: ${resources.experiments.agent_experiment.name}
          - name: LAKEBASE_AUTOSCALING_ENDPOINT
            value_from: postgres
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "mauro_bot_memory"
          - name: VS_INDEX_NAME
            value: ${var.catalog}.${var.schema}.mauro_bot_vs_index
          - name: LLM_ENDPOINT
            value: ${var.llm_endpoint}
      resources:
        - name: postgres
          postgres:
            branch: "projects/${var.lakebase_project_id}/branches/production"
            database: "projects/${var.lakebase_project_id}/branches/production/databases/databricks-postgres"
            permission: CAN_CONNECT_AND_CREATE

  # postgres_projects omitido: bug #5183 — siempre hace POST,
  # falla con "already exists" en re-deploy. Crear via UI o CLI.
  # postgres_projects:
  #   mauro_bot_memory:
  #     project_id: maurobot-memory
  #     display_name: Mauro Bot Memory Store

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: mauro_premium
    variables:
      catalog: dev_bronze

  prod:
    mode: production
    workspace:
      profile: mauro_premium
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}
    variables:
      catalog: pro_bronze
