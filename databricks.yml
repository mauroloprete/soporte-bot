bundle:
  name: soporte-bot
  engine: direct

variables:
  catalog:
    default: dev_bronze
  schema:
    default: labs

resources:
  experiments:
    agent_experiment:
      name: /Users/${workspace.current_user.userName}/soporte-bot

  registered_models:
    soporte_bot_model:
      name: soporte_bot
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}

  model_serving_endpoints:
    agent_endpoint:
      name: soporte-bot-${bundle.target}
      config:
        served_entities:
          - entity_name: dev_bronze.labs.soporte_bot
            entity_version: "5"
            workload_size: Small
            scale_to_zero_enabled: true
      ai_gateway:
        rate_limits:
          - key: user
            renewal_period: minute
            calls: 30

  vector_search_endpoints:
    soporte_bot_vs:
      name: soporte-bot-vs
      endpoint_type: STANDARD

  postgres_projects:
    soporte_bot_memory:
      project_id: soporte-bot-mem
      display_name: SoporteBot Memory Store

  apps:
    soporte_bot_app:
      name: soporte-bot
      source_code_path: ./app
      config:
        command:
          - streamlit
          - run
          - app.py
        env:
          - name: SERVING_ENDPOINT
            value: soporte-bot-${bundle.target}
      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: soporte-bot-${bundle.target}
            permission: CAN_QUERY

  jobs:
    refresh_index:
      name: "[${bundle.target}] Refresh Vector Index"
      tasks:
        - task_key: refresh
          notebook_task:
            notebook_path: ./src/refresh_index.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "America/Montevideo"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405619081216020.0.azuredatabricks.net
      profile: mauro_premium
    variables:
      catalog: dev_bronze

  prod:
    mode: production
    workspace:
      host: https://adb-7405619081216020.0.azuredatabricks.net
    run_as:
      user_name: mauroloprete@mauroloprete558.onmicrosoft.com
    variables:
      catalog: pro_bronze
