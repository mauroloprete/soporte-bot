<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauro Bot — Spark de Ideas</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9f8fc; color: #1e293b; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1e293b; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: .75rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header span { font-size: .85rem; opacity: .7; }
  #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .msg { max-width: 75%; padding: .75rem 1rem; border-radius: 1rem; line-height: 1.6; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #593196; color: #fff; border-bottom-right-radius: .25rem; white-space: pre-wrap; }
  .msg.bot { align-self: flex-start; background: #fff; border: 1px solid #e2e8f0; border-bottom-left-radius: .25rem; }
  .msg.bot p { margin: .4rem 0; }
  .msg.bot p:first-child { margin-top: 0; }
  .msg.bot p:last-child { margin-bottom: 0; }
  .msg.bot ul, .msg.bot ol { margin: .4rem 0 .4rem 1.2rem; }
  .msg.bot li { margin: .2rem 0; }
  .msg.bot a { color: #593196; text-decoration: underline; }
  .msg.bot code { background: #f1f5f9; padding: .15rem .35rem; border-radius: .25rem; font-size: .9em; }
  .msg.bot pre { background: #1e293b; color: #e2e8f0; padding: .75rem; border-radius: .5rem; overflow-x: auto; margin: .5rem 0; }
  .msg.bot pre code { background: none; padding: 0; }
  .msg.bot strong { font-weight: 600; }
  .msg.error { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
  #input-area { padding: 1rem 1.5rem; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: .75rem; }
  #input-area textarea { flex: 1; resize: none; border: 1px solid #cbd5e1; border-radius: .75rem; padding: .6rem 1rem; font-size: 1rem; font-family: inherit; outline: none; transition: border-color .2s; min-height: 44px; max-height: 120px; }
  #input-area textarea:focus { border-color: #593196; }
  #input-area button { background: #593196; color: #fff; border: none; border-radius: .75rem; padding: 0 1.25rem; font-size: 1rem; cursor: pointer; transition: opacity .2s; }
  #input-area button:disabled { opacity: .5; cursor: not-allowed; }
  .typing { display: inline-block; } .typing span { animation: blink 1.4s infinite both; } .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }
</style>
</head>
<body>
<header>
  <h1>Mauro Bot</h1>
  <span>Spark de Ideas &mdash; Databricks &amp; Data Engineering</span>
</header>
<div id="chat">
  <div class="msg bot">Hola! Soy Mauro Bot, tu asistente sobre Databricks y Data Engineering basado en el blog <strong>Spark de Ideas</strong>. Preguntame lo que quieras!</div>
</div>
<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Escribi tu pregunta..." autofocus></textarea>
  <button id="send-btn" onclick="send()">Enviar</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const btn = document.getElementById('send-btn');
const threadId = crypto.randomUUID();
let sending = false;

marked.setOptions({ breaks: true, gfm: true });

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function addMsg(html, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function renderMarkdown(text) {
  return marked.parse(text);
}

async function send() {
  const text = input.value.trim();
  if (!text || sending) return;
  sending = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';
  addMsg(esc(text), 'user');
  const botDiv = addMsg('<span class="typing"><span>.</span><span>.</span><span>.</span></span>', 'bot');

  let fullText = '';
  try {
    const body = {
      input: [{ type: 'message', role: 'user', content: text }],
      stream: true,
      custom_inputs: { thread_id: threadId },
    };

    const res = await fetch('/responses', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.text();
      botDiv.className = 'msg bot error';
      botDiv.textContent = 'Error: ' + res.status + ' — ' + err.slice(0, 200);
      return;
    }

    botDiv.textContent = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const evt = JSON.parse(raw);
          if (evt.type === 'response.output_text.delta' && evt.delta) {
            fullText += evt.delta;
            botDiv.innerHTML = renderMarkdown(fullText);
            chat.scrollTop = chat.scrollHeight;
          }
        } catch (_) {}
      }
    }
    if (!fullText) botDiv.textContent = '(sin respuesta)';
  } catch (e) {
    botDiv.className = 'msg bot error';
    botDiv.textContent = 'Error de conexion: ' + e.message;
  } finally {
    sending = false;
    btn.disabled = false;
    input.focus();
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
